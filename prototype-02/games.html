  <div class="app">
    <main class="content">
      <header class="screen-header">
        <h1>All Games</h1>
        <p>Explore every memory game</p>
      </header>

      <div class="game-list">
        <a class="game-card" href="#">
          <div class="game-card__body">
            <h2 class="game-card__title">Number Sequence</h2>
            <p class="game-card__description">Remember the order of numbers shown.</p>
          </div>
          <svg class="icon game-card__chevron" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"/>
          </svg>
        </a>

        <a class="game-card" href="#">
          <div class="game-card__body">
            <h2 class="game-card__title">Card Pairs</h2>
            <p class="game-card__description">Match pairs of cards from memory.</p>
          </div>
          <svg class="icon game-card__chevron" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"/>
          </svg>
        </a>

        <a class="game-card" href="#">
          <div class="game-card__body">
            <h2 class="game-card__title">Word Recall</h2>
            <p class="game-card__description">Recall words after a short delay.</p>
          </div>
          <svg class="icon game-card__chevron" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"/>
          </svg>
        </a>

        <a class="game-card" href="#">
          <div class="game-card__body">
            <h2 class="game-card__title">Pattern Flash</h2>
            <p class="game-card__description">Reproduce flashed patterns.</p>
          </div>
          <svg class="icon game-card__chevron" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"/>
          </svg>
        </a>

        <div class="game-card game-card--featured">
          <div class="game-card__body">
            <h2 class="game-card__title">Spatial Grid</h2>
            <p class="game-card__description">Remember positions on a grid.</p>
            <button type="button" class="btn-primary">Try it out</button>
          </div>
        </div>
      </div>
    </main>
